<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jumping Frog 🐸</title>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<script src="config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  canvas#game {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,200,100,0.3);
    display: block;
    cursor: pointer;
    max-width: 100vw;
    max-height: 100vh;
    max-height: 100dvh;
    width: auto;
    height: auto;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    text-align: center;
    padding: 20px;
    line-height: 1.3;
  }
  #score {
    color: #fff;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: bold;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  #coins {
    color: #fbbf24;
    font-size: clamp(14px, 2.5vw, 18px);
    font-weight: bold;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    margin-top: 2px;
  }
  #gameover {
    opacity: 0;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.88);
    border: 2px solid #4ade80;
    border-radius: 16px;
    padding: clamp(20px, 5vw, 40px) clamp(24px, 6vw, 50px);
    text-align: center;
    pointer-events: none;
    color: #fff;
    transition: opacity 0.3s ease;
    width: max-content;
    max-width: 90vw;
  }
  #gameover.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #dead-frog {
    display: none;
    margin: 0 auto 10px;
    pointer-events: none;
    background: transparent;
    outline: none;
    border: none;
  }
  #gameover.visible #dead-frog {
    display: block;
  }
  #gameover p { font-size: clamp(14px, 2.5vw, 20px); margin-bottom: 6px; color: #d1d5db; }
  #gameover .score-final { font-size: clamp(24px, 5vw, 36px); font-weight: bold; color: #4ade80; }
  #restart-btn {
    margin-top: 20px;
    padding: 12px 40px;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: #4ade80;
    color: #1a1a2e;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.15s;
  }
  #restart-btn:hover { transform: scale(1.05); background: #22c55e; }
  #ad-btn {
    margin-top: 14px;
    padding: 10px 28px;
    font-size: clamp(14px, 2.5vw, 17px);
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #1a1a2e;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.15s;
  }
  #ad-btn:hover { transform: scale(1.05); background: linear-gradient(135deg, #fcd34d, #fbbf24); }
  #ad-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #reset-btn {
    margin-top: 8px;
    padding: 8px 24px;
    font-size: clamp(12px, 2vw, 14px);
    font-weight: bold;
    border: 2px solid #9ca3af;
    border-radius: 10px;
    background: transparent;
    color: #d1d5db;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.15s;
  }
  #reset-btn:hover { background: rgba(255,255,255,0.08); color: #f87171; border-color: #f87171; }
  .confirm-btn {
    padding: 10px 24px;
    font-size: clamp(13px, 2.2vw, 15px);
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.15s;
  }
  .confirm-btn:hover { transform: scale(1.05); }
  .confirm-btn.yes { background: #f87171; color: #fff; }
  .confirm-btn.yes:hover { background: #ef4444; }
  .confirm-btn.no { background: #4ade80; color: #1a1a2e; }
  .confirm-btn.no:hover { background: #22c55e; }
  #music-btn {
    position: absolute;
    top: 16px; right: 16px;
    width: clamp(32px, 6vw, 40px); height: clamp(32px, 6vw, 40px);
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    font-size: clamp(16px, 3vw, 20px);
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    line-height: clamp(32px, 6vw, 40px);
    text-align: center;
    z-index: 10;
  }
  #music-btn:hover { background: rgba(255,255,255,0.25); color: #fff; transform: scale(1.1); }
  #music-btn.muted { opacity: 0.4; }
  #info {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: clamp(10px, 1.6vw, 13px);
    pointer-events: none;
    white-space: nowrap;
  }
  .game-wrapper {
    position: relative;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="game" width="800" height="500"></canvas>
  <div id="ui-overlay">
    <div id="score">0</div>
    <div id="coins">● 0</div>
  </div>
  <div id="gameover">
    <canvas id="dead-frog" width="80" height="80" style="background:none;"></canvas>
    <div class="go-main">
      <p>Счёт:</p>
      <div class="score-final" id="final-score">0</div>
      <p style="margin-top:4px;font-size:clamp(13px,2.2vw,16px);color:#fbbf24;">● <span id="final-coins">0</span></p>
      <p style="margin-top:8px;font-size:clamp(11px,1.8vw,14px);color:#9ca3af;">Лучший: <span id="best-score">0</span></p>
      <button id="ad-btn" style="display:none;">💎 Смотреть рекламу и продолжить</button>
      <button id="restart-btn">🔄 Ещё раз</button>
      <button id="reset-btn">▶ Начать заново</button>
    </div>
    <div class="go-confirm" style="display:none">
      <p style="font-size:clamp(14px,2.5vw,18px);color:#fff;margin-bottom:0;">Вы действительно хотите начать заново?</p>
      <p style="font-size:clamp(12px,1.8vw,14px);color:#f87171;margin-top:6px;">Все данные будут сброшены.</p>
      <div style="margin-top:18px;display:flex;gap:12px;justify-content:center;">
        <button id="confirm-yes-btn" class="confirm-btn yes">✅ Да, сбросить</button>
        <button id="confirm-no-btn" class="confirm-btn no">↩ Нет</button>
      </div>
    </div>
  </div>
  <button id="music-btn">🎵</button>
  <div id="info">⎆ Зажми и отпусти — прыжок</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');
const gameoverEl = document.getElementById('gameover');
const finalScoreEl = document.getElementById('final-score');
const finalCoinsEl = document.getElementById('final-coins');
const bestScoreEl = document.getElementById('best-score');
const restartBtn = document.getElementById('restart-btn');
const resetBtn = document.getElementById('reset-btn');
const confirmYesBtn = document.getElementById('confirm-yes-btn');
const confirmNoBtn = document.getElementById('confirm-no-btn');
const adBtn = document.getElementById('ad-btn');
const goMain = document.querySelector('.go-main');
const goConfirm = document.querySelector('.go-confirm');
const deadFrogCanvas = document.getElementById('dead-frog');
const deadFrogCtx = deadFrogCanvas.getContext('2d');

// ─── VK Bridge ───
const VK = {
  ready: false,
  userId: null,
  userName: null,
  userAvatar: null,
  friends: null,

  async init() {
    try {
      if (typeof vkBridge === 'undefined') {
        console.log('[VK] vkBridge не найден — работаем локально');
        return;
      }
      await vkBridge.send('VKWebAppInit', { app_id: VK_CONFIG.appId });
      const user = await vkBridge.send('VKWebAppGetUserInfo');
      this.userId = user.id;
      this.userName = `${user.first_name} ${user.last_name}`;
      this.userAvatar = user.photo_100;
      this.ready = true;
      console.log('[VK] Инициализирован, пользователь:', this.userName);
    } catch (e) {
      console.log('[VK] Инициализация пропущена (локальный режим):', e.message);
    }
  },

  async fetchFriends() {
    if (!this.ready) return null;
    try {
      const resp = await vkBridge.send('VKWebAppGetFriends', { multi: true });
      if (resp && resp.users) {
        this.friends = resp.users.map(u => ({
          id: u.id,
          name: `${u.first_name} ${u.last_name}`,
          initials: (u.first_name[0] || '') + (u.last_name[0] || ''),
          avatar: u.photo_100,
        }));
        return this.friends;
      }
    } catch (e) {
      console.log('[VK] Не удалось получить друзей:', e.message);
    }
    return null;
  },

  // Rewarded Video — возвращает true если реклама досмотрена
  async showRewardedAd() {
    if (!this.ready || typeof vkBridge === 'undefined') {
      // Локальный режим — симулируем просмотр
      console.log('[AD] Локальный режим — симулируем rewarded video');
      return true;
    }
    try {
      const resp = await vkBridge.send('VKWebAppShowNativeAds', {
        ad_format: 'reward'
      });
      // result: true если досмотрел, false если закрыл
      return resp && resp.result;
    } catch (e) {
      console.log('[AD] Ошибка показа рекламы:', e.message);
      return false;
    }
  },

  // Возвращает массив зрителей: только реальные друзья, без моков
  async getSpectators(score) {
    if (this.ready && !this.friends) {
      await this.fetchFriends();
    }
    if (this.friends && this.friends.length > 0) {
      return this._buildSpectators(this.friends, score);
    }
    return [];
  },

  _buildSpectators(users, score) {
    const colors = ['#4ade80','#60a5fa','#f472b6','#fbbf24','#a78bfa',
                    '#34d399','#f87171','#2dd4bf','#fb923c','#818cf8',
                    '#e879f9','#22d3ee','#f97316','#14b8a6','#a855f7'];
    const count = Math.min(users.length, 8 + Math.floor(score / 5));
    const list = [];
    for (let i = 0; i < count; i++) {
      const u = users[i % users.length];
      list.push({
        id: u.id, name: u.name, initials: u.initials,
        color: colors[i % colors.length],
        vkUrl: `https://vk.com/id${u.id}`,
      });
    }
    return list;
  },

  _buildMockSpectators(score) {
    const names = [
      ['Алексей','Иванов'],['Дмитрий','Смирнов'],['Максим','Кузнецов'],
      ['Сергей','Попов'],['Андрей','Васильев'],['Иван','Петров'],
      ['Владимир','Соколов'],['Артём','Михайлов'],['Никита','Новиков'],
      ['Михаил','Фёдоров'],['Екатерина','Морозова'],['Анна','Волкова'],
      ['Ольга','Алексеева'],['Наталья','Лебедева'],['Юлия','Семёнова'],
      ['Татьяна','Егорова'],['Мария','Павлова'],['Елена','Козлова'],
      ['Анастасия','Степанова'],['Дарья','Николаева'],
    ];
    const colors = ['#4ade80','#60a5fa','#f472b6','#fbbf24','#a78bfa',
                    '#34d399','#f87171','#2dd4bf','#fb923c','#818cf8',
                    '#e879f9','#22d3ee','#f97316','#14b8a6','#a855f7'];
    let count;
    if (score <= 15)      count = 8 + Math.floor(Math.random() * 30);
    else if (score <= 40) count = 4 + Math.floor(Math.random() * 15);
    else if (score <= 70) count = 2 + Math.floor(Math.random() * 8);
    else                  count = 1 + Math.floor(Math.random() * 4);
    count = Math.min(count, 40);
    const list = [];
    for (let i = 0; i < count; i++) {
      const [first, last] = names[Math.floor(Math.random() * names.length)];
      const id = 100000 + Math.floor(Math.random() * 89900000);
      list.push({
        id, name: `${first} ${last}`,
        initials: first[0] + last[0],
        color: colors[Math.floor(Math.random() * colors.length)],
        vkUrl: `https://vk.com/id${id}`,
      });
    }
    return list;
  }
};

// ─── Масштабирование canvas ───
function getCanvasScale() {
  const rect = canvas.getBoundingClientRect();
  return { sx: rect.width / W, sy: rect.height / H, left: rect.left, top: rect.top };
}

function screenToGame(sx, sy) {
  const s = getCanvasScale();
  return { x: (sx - s.left) / s.sx, y: (sy - s.top) / s.sy };
}

const W = 800, H = 500;
const GRAVITY = 980;
const MAX_CHARGE_TIME = 1.8;
const MIN_CHARGE = 0.35;
const MIN_JUMP_VY = -200;
const MAX_JUMP_VY = -500;
const MIN_JUMP_VX = 140;
const MAX_JUMP_VX = 380;
const GROUND_Y = H - 90;

// ─── Ширина платформ: сужается с ростом счёта (90→60px) ───
function getPlatformWidth(score) {
  const minW = 60;
  const maxW = 90;
  const startScore = 20;
  const endScore = 100;
  const t = Math.max(0, Math.min(1, (score - startScore) / (endScore - startScore)));
  return Math.round(maxW - t * (maxW - minW));
}

// ─── Frog ───
const FROG = {
  x: 120, y: 0,
  vx: 0, vy: 0,
  radius: 16,
  state: 'idle', // idle | charging | jumping | dead
  charge: 0,
  chargeTimer: 0,
  isOnPlatform: false,
  currentPlatform: null,
  animTimer: 0
};

// ─── Platforms ───
let platforms = [];
const PLATFORM_W = 90;
const PLATFORM_H = 18;
const MIN_GAP = 80;
const MAX_GAP = 180;
const MIN_HEIGHT_DIFF = -70;
const MAX_HEIGHT_DIFF = 75;

// ─── Camera ───
let camera = { x: 0 };

// ─── Game state ───
let score = 0;
let bestScore = parseInt(localStorage.getItem('frogBest') || '0');
bestScoreEl.textContent = bestScore;
let gameRunning = true;
let gameOver = false;
let spacePressed = false;
let particleEffects = [];
let isClickingSpectator = false;
let coins = [];               // монетки между платформами
let coinScore = 0;            // отдельный счётчик монет
let comboCount = 0;           // счётчик комбо
let platformStandTime = 0;    // время стояния на платформе
let lastPlatformId = null;    // предыдущая платформа (для детекта новой)

// ─── Ветер ───
let windForce = 0;
let windTimer = 0;
let windDuration = 8;
let windActive = false;
let windParticles = [];
let platformGenCount = 0;
let windInitialized = false; // счётчик сгенерированных платформ (для чекпоинтов)
let lastCroakMilestone = 0;   // трекинг фаз кваканья: 0, 1, 2, 3
let birds = [];                // птицы-препятствия
let birdSpawnCounter = 0;      // счётчик платформ до следующей птицы

// ─── Чекпоинты ───
const CHECKPOINT = {
  save(data) {
    localStorage.setItem('frog_checkpoint', JSON.stringify(data));
  },
  load() {
    try { return JSON.parse(localStorage.getItem('frog_checkpoint')); } catch { return null; }
  },
  clear() {
    localStorage.removeItem('frog_checkpoint');
  }
};

// ─── Настройки (localStorage) ───
const SETTINGS = {
  get(key, def) {
    try { return JSON.parse(localStorage.getItem('frog_' + key)) ?? def; }
    catch { return def; }
  },
  set(key, val) {
    localStorage.setItem('frog_' + key, JSON.stringify(val));
  }
};

// ─── Звёздное небо ───
let stars = [];
function generateStars() {
  stars = [];
  for (let i = 0; i < 70; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H * 0.55),
      size: 0.4 + Math.random() * 2.5,
      baseBright: 0.2 + Math.random() * 0.6,
      twinkleSpeed: 0.3 + Math.random() * 2.5,
      twinkleOff: Math.random() * Math.PI * 2,
    });
  }
}
generateStars();

function drawStars(time) {
  const t = time / 1000;
  for (const s of stars) {
    const bright = s.baseBright + Math.sin(t * s.twinkleSpeed + s.twinkleOff) * 0.15;
    ctx.globalAlpha = Math.max(0.05, bright);
    ctx.fillStyle = '#fff';
    const sz = s.size;
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Spectators System ───
// Летающие кружки с физикой: дрифт, отскоки друг от друга, платформ и лягушки
const SPECTATORS = {
  db: null,
  active: [],       // [{id, name, initials, color, vkUrl, homeX, homeY}] — ВСЕ для этого счёта
  flying: [],       // [{...base, physX, physY, vx, vy, radius, scale, growing}] — активные
  poolIndex: 0,     // Индекс следующего свободного зрителя для спавна
  enabled: true,    // Тумблер показа (🔭)
  standTimer: 0,    // 3-сек таймер ожидания на платформе
  isActive: false,  // Физика запущена
  currentScore: -1,
  targetScore: -1,
  avatarSize: 54,

  init() {
    this.db = {};
    this.active = [];
    this.flying = [];
    this.poolIndex = 0;
    this._spawnTimer = 0;
    this._maxActive = 12;
    this._cycleTimer = 5;
    this.isActive = false;
    this.standTimer = 0;
    this.currentScore = -1;
    this.targetScore = -1;
    this.enabled = SETTINGS.get('spectators', true);
    // Только реальные друзья VK — без моков
    this._loadVKData();
  },

  async _loadVKData() {
    const users = await VK.getSpectators(50);
    if (!users || users.length === 0) return;
    // Заполняем db реальными друзьями
    for (let s = 4; s <= 120; s++) {
      let count;
      if (s <= 15)      count = Math.min(users.length, 8 + Math.floor(Math.random() * 30));
      else if (s <= 40) count = Math.min(users.length, 4 + Math.floor(Math.random() * 15));
      else if (s <= 70) count = Math.min(users.length, 2 + Math.floor(Math.random() * 8));
      else              count = Math.min(users.length, 1 + Math.floor(Math.random() * 4));
      const list = [];
      for (let i = 0; i < count; i++) {
        const u = users[i % users.length];
        list.push({
          id: u.id, name: u.name, initials: u.initials,
          color: u.color, vkUrl: u.vkUrl,
        });
      }
      this.db[s] = list;
    }
    // Если зрители уже активны — перезагружаем текущий счёт
    if (this.currentScore >= 4 && this.db[this.currentScore]) {
      const all = this.db[this.currentScore];
      this.active = [];
      const cols = Math.min(all.length || 1, 8);
      const spacingX = (W - 80) / Math.min(Math.max(all.length, 1), cols);
      const spacingY = (H * 0.55) / Math.ceil(Math.max(all.length, 1) / cols);
      for (let i = 0; i < all.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        this.active.push({
          ...all[i],
          homeX: 40 + col * spacingX + (Math.random() - 0.5) * 25,
          homeY: 40 + row * spacingY + (Math.random() - 0.5) * 15,
        });
      }
    }
  },

  // Смена счёта — загружаем новых зрителей, сбрасываем таймер
  onScore(score) {
    if (score === this.currentScore) return;
    this.currentScore = score;
    this.isActive = false;
    this.standTimer = 0;
    this.flying = [];
    this.poolIndex = 0;
    const all = this.db[score] || [];
    this.active = [];
    const cols = Math.min(all.length || 1, 8);
    const spacingX = (W - 80) / Math.min(Math.max(all.length, 1), cols);
    const spacingY = (H * 0.55) / Math.ceil(Math.max(all.length, 1) / cols);
    for (let i = 0; i < all.length; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      this.active.push({
        ...all[i],
        homeX: 40 + col * spacingX + (Math.random() - 0.5) * 25,
        homeY: 40 + row * spacingY + (Math.random() - 0.5) * 15,
      });
    }
  },

  // Вызывается каждый кадр, когда лягушка стоит на платформе
  onStanding(dt) {
    if (!this.enabled || this.isActive || this.active.length === 0) return;
    this.standTimer += dt;
    if (this.standTimer >= 3) this._activate();
  },

  // При прыжке/зарядке — выключаем физику
  onJump() {
    this.standTimer = 0;
    if (this.isActive) {
      this.flying = [];
      this.isActive = false;
      this.poolIndex = 0;
    }
  },

  _activate() {
    this.isActive = true;
    this.flying = [];
    this.poolIndex = 0;
    this._spawnTimer = 0;
    this._maxActive = Math.min(12, this.active.length);
    this._cycleTimer = 5;
    // Перемешиваем, чтобы кружки появлялись в случайных местах
    for (let i = this.active.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.active[i], this.active[j]] = [this.active[j], this.active[i]];
    }
    // Первый кружок сразу
    if (this._maxActive > 0) {
      this._spawnAtIndex(0, true);
      this.poolIndex = 1;
    }
  },

  _spawnAtIndex(index, fromHome) {
    if (index >= this.active.length) return null;
    const base = this.active[index];
    const speed = 15 + Math.random() * 25;
    const c = {
      ...base, radius: this.avatarSize / 2,
      physX: fromHome ? base.homeX : (base.homeX + (Math.random() - 0.5) * 40),
      physY: fromHome ? base.homeY : (base.homeY + (Math.random() - 0.5) * 40),
      vx: 0, vy: 0,
      scale: 0.01, growing: true,
    };
    // Направление: не лететь в сторону ближайшего края
    let minDist = Math.min(c.physX, W - c.physX, c.physY, H - c.physY);
    let angle;
    if (minDist < 100) {
      // Отталкиваемся от ближайшего края
      const edges = [];
      if (c.physX < 100) edges.push(0);           // right
      if (c.physX > W - 100) edges.push(Math.PI); // left
      if (c.physY < 100) edges.push(Math.PI / 2); // down
      if (c.physY > H - 100) edges.push(-Math.PI / 2); // up
      if (edges.length > 0) {
        const from = edges[0];
        const spread = Math.PI * 0.6;
        angle = from - spread / 2 + Math.random() * spread;
      } else {
        angle = Math.random() * Math.PI * 2;
      }
    } else {
      angle = Math.random() * Math.PI * 2;
    }
    c.vx = Math.cos(angle) * speed;
    c.vy = Math.sin(angle) * speed;
    this.flying.push(c);
    playPopSound();
    return c;
  },

  update(dt) {
    if (!this.isActive || !this.enabled) return;

    // ─── Растянутое появление (3 сек на всех) ───
    if (this.poolIndex < this._maxActive) {
      this._spawnTimer += dt;
      const interval = 3 / this._maxActive;
      while (this._spawnTimer >= interval && this.poolIndex < this._maxActive) {
        this._spawnTimer -= interval;
        this._spawnAtIndex(this.poolIndex, true);
        this.poolIndex++;
      }
    }
    // ─── Циклическая замена: старый → новый из пула ───
    if (this.poolIndex >= this._maxActive && this.poolIndex < this.active.length) {
      this._cycleTimer += dt;
      if (this._cycleTimer >= 6) {
        this._cycleTimer = 0;
        if (this.flying.length > 0) {
          const idx = Math.floor(Math.random() * this.flying.length);
          this.flying.splice(idx, 1);
          this._spawnAtIndex(this.poolIndex, false);
          this.poolIndex++;
        }
      }
    }

    if (this.flying.length === 0) return;
    const r = this.avatarSize / 2;

    // ─── Движение ───
    for (const c of this.flying) {
      c.physX += c.vx * dt;
      c.physY += c.vy * dt;
      // Случайный дрифт — чтобы кружки разлетались по всему экрану
      c.vx += (Math.random() - 0.5) * 120 * dt;
      c.vy += (Math.random() - 0.5) * 120 * dt;
      // Лёгкое замедление
      c.vx *= 0.99;
      c.vy *= 0.99;
      // Ограничение максимальной скорости
      const maxV = 160;
      const spd = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
      if (spd > maxV) { c.vx = (c.vx / spd) * maxV; c.vy = (c.vy / spd) * maxV; }
    }

    // ─── Столкновения кружков друг с другом ───
    for (let i = 0; i < this.flying.length; i++) {
      for (let j = i + 1; j < this.flying.length; j++) {
        const a = this.flying[i], b = this.flying[j];
        const dx = b.physX - a.physX, dy = b.physY - a.physY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = r * 2;
        if (dist < minDist && dist > 0.01) {
          const nx = dx / dist, ny = dy / dist, over = (minDist - dist) / 2;
          a.physX -= nx * over; a.physY -= ny * over;
          b.physX += nx * over; b.physY += ny * over;
          const dv = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
          if (dv > 0) { const boost = 1.12; a.vx -= dv * nx * boost; a.vy -= dv * ny * boost; b.vx += dv * nx * boost; b.vy += dv * ny * boost; }
        }
      }
    }

    // ─── Столкновения с платформами ───
    for (const c of this.flying) {
      for (const p of platforms) {
        const cx = Math.max(p.x, Math.min(c.physX, p.x + p.w));
        const cy = Math.max(p.y, Math.min(c.physY, p.y + p.h));
        const dx = c.physX - cx, dy = c.physY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < r && dist > 0.01) {
          const nx = dx / dist, ny = dy / dist;
          c.physX = cx + nx * (r + 2);
          c.physY = cy + ny * (r + 2);
          const dot = c.vx * nx + c.vy * ny;
          if (dot < 0) { c.vx -= 2 * dot * nx; c.vy -= 2 * dot * ny; }
        }
      }
    }

    // ─── Столкновение с лягушкой ───
    if (FROG.state !== 'dead') {
      const fx = FROG.x, fy = FROG.y;
      for (const c of this.flying) {
        const dx = c.physX - fx, dy = c.physY - fy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = r + FROG.radius;
        if (dist < minDist && dist > 0.01) {
          const nx = dx / dist, ny = dy / dist;
          c.physX = fx + nx * (minDist + 2);
          c.physY = fy + ny * (minDist + 2);
          const dot = c.vx * nx + c.vy * ny;
          if (dot < 0) { c.vx -= 2 * dot * nx; c.vy -= 2 * dot * ny; }
        }
      }
    }

    // ─── Вылет за экран → замена ───
    for (let i = this.flying.length - 1; i >= 0; i--) {
      const c = this.flying[i];
      if (c.physX < -80 || c.physX > W + 80 || c.physY < -80 || c.physY > H + 80) {
        this.flying.splice(i, 1);
        if (this.poolIndex < this.active.length) {
          this._spawnAtIndex(this.poolIndex, false);
          this.poolIndex++;
        }
      }
    }

    // ─── Scale-анимация появления ───
    for (const c of this.flying) {
      if (c.growing) { c.scale = Math.min(c.scale + dt * 7, 1); if (c.scale >= 1) c.growing = false; }
    }
  },

  draw(ctx) {
    if (!this.isActive || !this.enabled || this.flying.length === 0) return;
    const r = this.avatarSize / 2;
    ctx.save();
    for (const c of this.flying) {
      const sc = c.scale || 1;
      ctx.save();
      ctx.translate(c.physX, c.physY);
      ctx.scale(sc, sc);
      ctx.translate(-c.physX, -c.physY);

      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.arc(c.physX + 2, c.physY + 3, r, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = c.color;
      ctx.beginPath(); ctx.arc(c.physX, c.physY, r, 0, Math.PI * 2); ctx.fill();

      const g = ctx.createRadialGradient(c.physX - r*0.2, c.physY - r*0.2, r*0.2, c.physX, c.physY, r);
      g.addColorStop(0,'rgba(255,255,255,0.15)'); g.addColorStop(0.5,'rgba(255,255,255,0)'); g.addColorStop(1,'rgba(0,0,0,0.25)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(c.physX, c.physY, r, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${r*0.6}px "Segoe UI",Arial,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(c.initials, c.physX, c.physY + 1);

      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(c.physX, c.physY, r - 1, 0, Math.PI * 2); ctx.stroke();

      ctx.restore();
    }
    ctx.restore();
  },

  hitTest(mx, my) {
    if (!this.isActive || !this.enabled) return null;
    const r = this.avatarSize / 2;
    for (const c of this.flying) {
      const dx = mx - c.physX, dy = my - c.physY;
      if (dx*dx + dy*dy <= (r + 6)*(r + 6)) return c;
    }
    return null;
  },

  toggle() {
    this.enabled = !this.enabled;
    SETTINGS.set('spectators', this.enabled);
    if (!this.enabled) { this.flying = []; this.isActive = false; this.standTimer = 0; }
    return this.enabled;
  },

  reset() {
    this.active = [];
    this.flying = [];
    this.poolIndex = 0;
    this._spawnTimer = 0;
    this._maxActive = 12;
    this._cycleTimer = 5;
    this.isActive = false;
    this.standTimer = 0;
    this.currentScore = -1;
    this.targetScore = -1;
  }
};

// ─── Background Music (Web Audio API) ───
const musicBtn = document.getElementById('music-btn');
const BGMusic = {
  ctx: null,
  playing: false,
  started: false,
  masterGain: null,
  melOsc: null, melGain: null,
  bassOsc: null, bassGain: null,
  arpOsc: null, arpGain: null,
  nextTimeout: null,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.08;
    this.masterGain.connect(this.ctx.destination);

    // Melody oscillator (triangle — мягкий, пиксельный звук)
    this.melOsc = this.ctx.createOscillator();
    this.melGain = this.ctx.createGain();
    this.melOsc.type = 'triangle';
    this.melOsc.connect(this.melGain);
    this.melGain.connect(this.masterGain);
    this.melGain.gain.value = 0;
    this.melOsc.start();

    // Bass oscillator
    this.bassOsc = this.ctx.createOscillator();
    this.bassGain = this.ctx.createGain();
    this.bassOsc.type = 'sine';
    this.bassOsc.connect(this.bassGain);
    this.bassGain.connect(this.masterGain);
    this.bassGain.gain.value = 0;
    this.bassOsc.start();

    // Arpeggio (быстрый перебор нот)
    this.arpOsc = this.ctx.createOscillator();
    this.arpGain = this.ctx.createGain();
    this.arpOsc.type = 'square';
    this.arpOsc.connect(this.arpGain);
    this.arpGain.connect(this.masterGain);
    this.arpGain.gain.value = 0;
    this.arpOsc.start();
  },

  start() {
    if (this.started) return;
    this.init();
    this.started = true;
    this.playing = true;
    SETTINGS.set('music', true);
    musicBtn.textContent = '🔊';
    musicBtn.classList.remove('muted');
    this.scheduleLoop();
  },

  stop() {
    this.playing = false;
    this.started = false;
    SETTINGS.set('music', false);
    if (this.nextTimeout) {
      clearTimeout(this.nextTimeout);
      this.nextTimeout = null;
    }
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    if (this.melGain) { this.melGain.gain.cancelScheduledValues(now); this.melGain.gain.setValueAtTime(0, now); }
    if (this.bassGain) { this.bassGain.gain.cancelScheduledValues(now); this.bassGain.gain.setValueAtTime(0, now); }
    if (this.arpGain) { this.arpGain.gain.cancelScheduledValues(now); this.arpGain.gain.setValueAtTime(0, now); }
    musicBtn.textContent = '🎵';
    musicBtn.classList.add('muted');
  },

  toggle() {
    if (this.playing) this.stop();
    else this.start();
  },

  scheduleLoop() {
    if (!this.playing || !this.ctx) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const bpm = 128;
    const beat = 60 / bpm;

    // === Мелодия (C major pentatonic — весёлая, лягушачья) ===
    const melody = [
      // Частота, длительность в долях
      [261.63, 1], [329.63, 1], [392.00, 1], [440.00, 1],
      [392.00, 1], [329.63, 1], [293.66, 1], [261.63, 1],
      // ---- вторая половина
      [329.63, 1], [392.00, 1], [440.00, 1], [523.25, 1],
      [440.00, 1], [392.00, 1], [329.63, 1], [293.66, 1],
    ];

    // === Бас (корни C2 и G2) ===
    const bass = [
      [65.41, 2], [65.41, 2], [98.00, 2], [98.00, 2],
    ];

    // === Арпеджио (быстрые ноты между долями) ===
    const arp = [
      // восьмые ноты на 2-ю и 4-ю долю каждого такта
      [0, 0], [392.00, 0.5], [0, 0.5], [440.00, 0.5], [0, 0], [329.63, 0.5], [0, 0.5], [293.66, 0.5],
      [0, 0], [440.00, 0.5], [0, 0.5], [523.25, 0.5], [0, 0], [392.00, 0.5], [0, 0.5], [329.63, 0.5],
    ];

    const totalBeats = 16; // 4 такта по 4 доли
    const loopDuration = totalBeats * beat;

    // Планируем мелодию
    let t = now;
    for (const [freq, dur] of melody) {
      this.melGain.gain.setValueAtTime(0, t);
      this.melOsc.frequency.setValueAtTime(freq, t);
      this.melGain.gain.linearRampToValueAtTime(0.25, t + 0.02);
      this.melGain.gain.setValueAtTime(0.25, t + dur * beat - 0.04);
      this.melGain.gain.linearRampToValueAtTime(0, t + dur * beat);
      t += dur * beat;
    }

    // Планируем бас
    t = now;
    for (const [freq, dur] of bass) {
      this.bassGain.gain.setValueAtTime(0, t);
      this.bassOsc.frequency.setValueAtTime(freq, t);
      this.bassGain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      this.bassGain.gain.setValueAtTime(0.18, t + dur * beat - 0.03);
      this.bassGain.gain.linearRampToValueAtTime(0, t + dur * beat);
      t += dur * beat;
    }

    // Планируем арпеджио
    t = now;
    for (const [freq, dur] of arp) {
      if (freq > 0) {
        this.arpGain.gain.setValueAtTime(0, t);
        this.arpOsc.frequency.setValueAtTime(freq, t);
        this.arpGain.gain.linearRampToValueAtTime(0.06, t + 0.01);
        this.arpGain.gain.setValueAtTime(0.06, t + dur * beat - 0.03);
        this.arpGain.gain.linearRampToValueAtTime(0, t + dur * beat);
      } else {
        this.arpGain.gain.setValueAtTime(0, t);
      }
      t += dur * beat;
    }

    // Планируем следующий цикл
    this.nextTimeout = setTimeout(() => this.scheduleLoop(), (loopDuration - 0.1) * 1000);
  },

  tryStart() {
    if (!SETTINGS.get('music', true)) return;
    this.start();
  }
};

// ─── Короткий звук появления зрителя (pop) ───
let _soundCtx = null;

function playPopSound() {
  let ctx = BGMusic.ctx || _soundCtx;
  if (!ctx) {
    try { _soundCtx = new (window.AudioContext || window.webkitAudioContext)(); ctx = _soundCtx; }
    catch (e) { return; }
  }
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(720, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(480, ctx.currentTime + 0.06);
  gain.gain.setValueAtTime(0.05, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.1);
}

function playCoinSound() {
  let ctx = BGMusic.ctx || _soundCtx;
  if (!ctx) {
    try { _soundCtx = new (window.AudioContext || window.webkitAudioContext)(); ctx = _soundCtx; }
    catch (e) { return; }
  }
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.06);
  gain.gain.setValueAtTime(0.07, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  osc.connect(gain);

  osc.start(ctx.currentTime);

}

function playCroakSound(intensity) {
  // intensity: 0..1 — лёгкое → громкое кваканье
  let ctx = BGMusic.ctx || _soundCtx;
  if (!ctx) {
    try { _soundCtx = new (window.AudioContext || window.webkitAudioContext)(); ctx = _soundCtx; }
    catch (e) { return; }
  }
  if (ctx.state === 'suspended') ctx.resume();
  const now = ctx.currentTime;
  const baseFreq = 200 + intensity * 180;        // 200→380 Гц
  const vol = 0.02 + intensity * 0.06;            // 0.02→0.08
  const dur = 0.08 + intensity * 0.07;            // 0.08→0.15с

  // Основной тон с vibrato
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(baseFreq, now);
  osc.frequency.setValueAtTime(baseFreq * 1.08, now + dur * 0.3);
  osc.frequency.setValueAtTime(baseFreq * 0.94, now + dur * 0.6);
  osc.frequency.setValueAtTime(baseFreq, now + dur);
  // Амплитудное дрожание («р-р-риббит»)
  gain.gain.setValueAtTime(vol * 0.3, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.015);
  gain.gain.setValueAtTime(vol * 0.6, now + dur * 0.4);
  gain.gain.linearRampToValueAtTime(vol, now + dur * 0.5);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + dur + 0.02);
}

function playDeathSound() {
  let ctx = BGMusic.ctx || _soundCtx;
  if (!ctx) {
    try { _soundCtx = new (window.AudioContext || window.webkitAudioContext)(); ctx = _soundCtx; }
    catch (e) { return; }
  }
  if (ctx.state === 'suspended') ctx.resume();
  const now = ctx.currentTime;

  // Три ноты вниз: E4→C4→G3
  const notes = [
    { freq: 330, start: 0, dur: 0.15 },    // E4
    { freq: 262, start: 0.12, dur: 0.18 },  // C4
    { freq: 196, start: 0.26, dur: 0.25 },  // G3
  ];

  for (const n of notes) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(n.freq, now + n.start);
    osc.frequency.setValueAtTime(n.freq * 0.98, now + n.start + n.dur);
    gain.gain.setValueAtTime(0.06, now + n.start);
    gain.gain.exponentialRampToValueAtTime(0.001, now + n.start + n.dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + n.start);
    osc.stop(now + n.start + n.dur + 0.02);
  }
}

function playBirdHitSound() {
  let ctx = BGMusic.ctx || _soundCtx;
  if (!ctx) {
    try { _soundCtx = new (window.AudioContext || window.webkitAudioContext)(); ctx = _soundCtx; }
    catch (e) { return; }
  }
  if (ctx.state === 'suspended') ctx.resume();
  const now = ctx.currentTime;

  // Шумовой удар + писк
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, now);
  osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.16);
}

// ─── Init ───
function init() {
  platforms = [];
  score = 0;
  scoreEl.textContent = '0';
  coinScore = 0;
  coinsEl.textContent = '● 0';
  camera.x = 0;
  gameOver = false;
  gameRunning = true;
  gameoverEl.classList.remove('visible');
  goMain.style.display = 'block';
  goConfirm.style.display = 'none';
  particleEffects = [];
  coins = [];
  birds = [];
  birdSpawnCounter = 0;
  coinScore = 0;
  comboCount = 0;
  platformStandTime = 0;
  lastPlatformId = null;
  SPECTATORS.init();
  platformGenCount = 0;
  windInitialized = false;

  // ─── Загрузка чекпоинта ───
  const cp = CHECKPOINT.load();
  // Валидация: домики только на счёте кратном 10
  const startFromCheck = cp && cp.score > 0 && cp.score % 10 === 0 && cp.genCount > 0;
  if (cp && !startFromCheck) {
    // Чистим битый/старый чекпоинт
    CHECKPOINT.clear();
  }

  // Выставляем score ДО генерации, чтобы ширина платформ считалась правильно
  if (startFromCheck) {
    score = cp.score;
    scoreEl.textContent = score;
  }

  // Starting platform
  platforms.push({
    x: 60, y: GROUND_Y,
    w: PLATFORM_W, h: PLATFORM_H,
    type: 'normal',
    genCount: 0
  });

  // Generate platforms up to checkpoint (or 8 for fresh start)
  let lastP = platforms[0];
  const targetCount = startFromCheck ? cp.genCount : 8;
  while (platformGenCount < targetCount) {
    lastP = generateNextPlatform(lastP);
  }
  if (startFromCheck) {
    // Последняя платформа — это домик, принудительно
    lastP.type = 'house';
    // Помечаем все платформы до чекпоинта включительно как пройденные
    for (const p of platforms) {
      if (p.genCount > 0 && p.genCount <= cp.genCount) {
        p.scored = true;
      }
    }
    SPECTATORS.onScore(score);
    // Обрезаем старые платформы (оставляем буфер 400px слева от lastP)
    platforms = platforms.filter(p => p.x + p.w > lastP.x - 400);
  }

  // Frog positioning
  if (startFromCheck) {
    FROG.x = lastP.x + lastP.w / 2;
    FROG.y = lastP.y - FROG.radius;
    FROG.currentPlatform = lastP;
    camera.x = Math.max(0, FROG.x - W * 0.35);
  } else {
    FROG.x = 120;
    FROG.y = platforms[0].y - FROG.radius;
    FROG.currentPlatform = platforms[0];
  }
  FROG.vx = 0;
  FROG.vy = 0;
  FROG.state = 'idle';
  FROG.charge = 0;
  FROG.chargeTimer = 0;
  FROG.isOnPlatform = true;
  FROG.animTimer = 0;
  FROG.rotation = 0;
}

function generateNextPlatform(prev) {
  platformGenCount++;

  // Динамическая ширина платформы: сужается с ростом счёта
  const baseW = getPlatformWidth(score);
  const shrinkPx = PLATFORM_W - baseW; // 0..30

  // Gap тоже чуть сужается, чтобы игра оставалась честной
  const adjMinGap = Math.max(60, MIN_GAP - shrinkPx * 0.4);
  const adjMaxGap = Math.max(120, MAX_GAP - shrinkPx * 0.6);

  let gap, hDiff;
  if (prev.type === 'spike') {
    // После шипов — гарантированно достижимая платформа
    gap = adjMinGap + Math.random() * (adjMaxGap * 0.5 - adjMinGap);
    hDiff = Math.min(20, MIN_HEIGHT_DIFF + Math.random() * 30);
  } else {
    gap = adjMinGap + Math.random() * (adjMaxGap - adjMinGap);
    hDiff = MIN_HEIGHT_DIFF + Math.random() * (MAX_HEIGHT_DIFF - MIN_HEIGHT_DIFF);
  }
  let nx = prev.x + prev.w + gap;
  let ny = prev.y + hDiff;
  ny = Math.max(150, Math.min(GROUND_Y, ny));
  let type = 'normal';
  if (prev.type === 'spring') {
    // После трамплина не спавним трамплин и движущиеся — игроку нужен контроль
    if (score >= 30 && Math.random() < 0.10) type = 'ice';
    else if (Math.random() > 0.8) type = 'thin';
  }
  else if (score >= 15 && Math.random() < 0.08) type = 'spring';
  else if (score >= 25 && Math.random() < 0.10) type = 'moving';
  else if (score >= 30 && Math.random() < 0.10) type = 'ice';
  else if (Math.random() > 0.8) type = 'thin';
  const p = {
    x: nx, y: ny,
    w: baseW + (Math.random() > 0.6 ? (baseW >= 70 ? 30 : 20) : 0),
    h: PLATFORM_H,
    type: type
  };
  p.genCount = platformGenCount;
  if (p.type === 'thin') p.h = 10;
  if (p.type === 'ice') p.iceTimer = 0;
  if (p.type === 'moving') { p.moveDir = 1; p.moveSpeed = 40 + Math.random() * 40; p.moveX = nx; p.moveAxis = Math.random() < 0.35 ? 'y' : 'x'; if (p.moveAxis === 'y') p.moveY0 = ny; }
  platforms.push(p);

  // Монетки между платформами (1–3 штуки в дуге)
  const coinCount = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < coinCount; i++) {
    const t = (i + 1) / (coinCount + 1);
    const cx = prev.x + prev.w + gap * t;
    const cy = Math.min(prev.y, ny) - 50 - Math.sin(t * Math.PI) * 40 - Math.random() * 20;
    coins.push({ x: cx, y: cy, r: 7, collected: false, spark: Math.random() * Math.PI * 2 });
  }

  // Птицы-препятствия (с 20 очков, каждые 3–8 платформ)
  if (score >= 20) {
    birdSpawnCounter--;
    if (birdSpawnCounter <= 0) {
      birdSpawnCounter = 3 + Math.floor(Math.random() * 6); // 3..8
      const birdY = 200 + Math.random() * 300; // разная высота
      birds.push({
        x: nx + 300 + Math.random() * 200, // справа от новой платформы
        y: birdY,
        vx: -60 - Math.random() * 50,       // летит влево
        vy: -10 + Math.random() * 20,       // небольшой вертикальный дрейф
        radius: 14,
        wingPhase: Math.random() * Math.PI * 2
      });
    }
  }

  return p;
}

// ─── Jump ───
function jump(power) {
  // power is 0-1
  if (power < 0.15) {
    // Микро-прыжок: быстрый тап → маленькое перемещение
    const mp = power / 0.15; // 0..1 в диапазоне тапа
    FROG.vx = 50 + mp * 80;       // 50..130 px/s
    FROG.vy = -80 - mp * 120;     // -80..-200 px/s
  } else {
    const p = MIN_CHARGE + (power - 0.15) / 0.85 * (1 - MIN_CHARGE);
    FROG.vx = MIN_JUMP_VX + p * (MAX_JUMP_VX - MIN_JUMP_VX);
    FROG.vy = MIN_JUMP_VY + p * (MAX_JUMP_VY - MIN_JUMP_VY);
  }
  FROG.state = 'jumping';
  FROG.isOnPlatform = false;
  FROG.currentPlatform = null;

  // Комбо: быстрый прыжок увеличивает множитель
  if (platformStandTime < 0.7) {
    comboCount++;
  } else {
    comboCount = 0;
  }
  platformStandTime = 0;

  // Particles
  for (let i = 0; i < 6; i++) {
    particleEffects.push({
      x: FROG.x, y: FROG.y + FROG.radius,
      vx: -30 + Math.random() * 60,
      vy: -20 - Math.random() * 60,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.8,
      size: 3 + Math.random() * 4,
      color: '#4ade80'
    });
  }
}

// ─── Частицы при ударе о платформу сбоку/снизу ───
function spawnBounceParticles(p, side) {
  let cx, cy, dx, dy;
  if (side === 'left')      { cx = p.x;          cy = FROG.y; dx = -30; dy = 0; }
  else if (side === 'right') { cx = p.x + p.w;    cy = FROG.y; dx = 30;  dy = 0; }
  else if (side === 'bottom'){ cx = FROG.x;       cy = p.y + p.h; dx = 0; dy = 30; }
  else return;
  for (let i = 0; i < 5; i++) {
    particleEffects.push({
      x: cx, y: cy,
      vx: dx + (Math.random() - 0.5) * 40,
      vy: dy + (Math.random() - 0.5) * 40,
      life: 0.2 + Math.random() * 0.25,
      maxLife: 0.45,
      size: 2 + Math.random() * 3,
      color: side === 'bottom' ? '#f87171' : '#fbbf24'
    });
  }
}

// ─── Обработка приземления (шипы, лёд, очки, частицы) ───
function onLand(p) {
  if (p.type === 'spike') p.spikeTimer = 1.5;
  if (p.type === 'ice') p.iceTimer = 1.2;

  // Трамплин — автопрыжок
  if (p.type === 'spring') {
    FROG.vx = MIN_JUMP_VX + 0.5 * (MAX_JUMP_VX - MIN_JUMP_VX);
    FROG.vy = MIN_JUMP_VY + 0.5 * (MAX_JUMP_VY - MIN_JUMP_VY);
    playSpringSound();
    FROG.state = 'jumping';
    FROG.isOnPlatform = false;
    FROG.currentPlatform = null;
    comboCount = 0;
    platformStandTime = 0;
    for (let i = 0; i < 8; i++) {
      particleEffects.push({
        x: FROG.x, y: FROG.y + FROG.radius,
        vx: -30 + Math.random() * 60,
        vy: -60 - Math.random() * 40,
        life: 0.4, maxLife: 0.4,
        size: 4 + Math.random() * 3,
        color: '#fb923c'
      });
    }
    return;
  }

  // Комбо-бонус — в монеты, не в счёт платформ
  if (comboCount >= 2) {
    coinScore += comboCount;
    coinsEl.textContent = '● ' + coinScore;
    comboCount = 0;
  } else {
    comboCount = 0;
  }

  if (p !== platforms[0] && !p.scored) {
    p.scored = true;
    score++;
    scoreEl.textContent = score;
    SPECTATORS.onScore(score);
    // Ретроактивно: платформа становится домиком, когда счёт кратен 10
    if (score > 0 && score % 10 === 0) {
      p.type = 'house';
      CHECKPOINT.save({ score: score, genCount: p.genCount });
      playCheckpointSound();
    }
  }

  for (let i = 0; i < 4; i++) {
    particleEffects.push({
      x: FROG.x, y: FROG.y + FROG.radius,
      vx: -20 + Math.random() * 40,
      vy: -10 - Math.random() * 30,
      life: 0.3 + Math.random() * 0.2,
      maxLife: 0.5,
      size: 2 + Math.random() * 3,
      color: '#fbbf24'
    });
  }
}

// ─── Update ───
function update(dt) {
  SPECTATORS.update(dt);
  if (!gameRunning || gameOver) return;

  // ─── Ветер ───
  if (score >= 20) {
    if (!windInitialized) {
      windInitialized = true;
      windForce = (Math.random() - 0.5) * 120;
      windActive = Math.abs(windForce) > 15;
      windTimer = 0;
      windDuration = 5 + Math.random() * 6;
    }
    windTimer += dt;
    if (windTimer >= windDuration) {
      windTimer = 0;
      windDuration = 5 + Math.random() * 6;
      windForce = (Math.random() - 0.5) * 180;
      windActive = Math.abs(windForce) > 15;
    }
    // ─── Частицы ветра ───
    const windStr = Math.abs(windForce) / 90;
    const density = 1.5 + windStr * 4; // больше частиц при сильном ветре
    if (Math.random() < density * dt) {
      const fromLeft = windForce > 0;
      windParticles.push({
        x: fromLeft ? -10 : W + 10,
        y: Math.random() * H,
        vx: windForce * 2.5 + (Math.random() - 0.5) * 30, // проходят через весь экран
        vy: (Math.random() - 0.5) * 25,
        life: 1.5 + Math.random() * 2,
        maxLife: 3.5,
        size: 1 + Math.random() * 3,
      });
    }
    // Обновление и удаление частиц
    for (let i = windParticles.length - 1; i >= 0; i--) {
      const p = windParticles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0 || p.x < -20 || p.x > W + 20) {
        windParticles.splice(i, 1);
      }
    }
  } else {
    windForce = 0;
    windActive = false;
    // Частицы ветра постепенно исчезают
    for (let i = windParticles.length - 1; i >= 0; i--) {
      windParticles[i].life -= dt * 3;
      if (windParticles[i].life <= 0) windParticles.splice(i, 1);
    }
  }

  // ─── Птицы ───
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.wingPhase += dt * 12; // взмах крыльев
    // Удаление далеко слева за камерой
    if (b.x < camera.x - 200) birds.splice(i, 1);
  }

  // Charge
  if (FROG.state === 'charging') {
    FROG.chargeTimer += dt;
    FROG.charge = Math.min(FROG.chargeTimer / MAX_CHARGE_TIME, 1);
    FROG.animTimer += dt * 4;
    // Кваканье по мере набора силы
    if (lastCroakMilestone < 1 && FROG.charge >= 0.15) { playCroakSound(0.15); lastCroakMilestone = 1; }
    if (lastCroakMilestone < 2 && FROG.charge >= 0.50) { playCroakSound(0.5); lastCroakMilestone = 2; }
    if (lastCroakMilestone < 3 && FROG.charge >= 0.95) { playCroakSound(1.0); lastCroakMilestone = 3; }
  }

  // ─── Сохраняем позицию до физики для swept-коллизии ───
  const prevY = FROG.y;

  // Physics
  if (FROG.state === 'jumping' || FROG.state === 'dead') {
    // Ветер сносит лягушку в полёте
    if (FROG.state === 'jumping') FROG.vx += windForce * dt;

    // Сбор монеток в полёте
    if (FROG.state === 'jumping') {
      for (const c of coins) {
        if (c.collected) continue;
        const dx = FROG.x - c.x, dy = FROG.y - c.y;
        if (dx * dx + dy * dy < (FROG.radius + c.r) * (FROG.radius + c.r)) {
          c.collected = true;
          coinScore++;
          coinsEl.textContent = '● ' + coinScore;
          playCoinSound();
          for (let j = 0; j < 5; j++) {
            particleEffects.push({
              x: c.x, y: c.y,
              vx: (Math.random() - 0.5) * 60,
              vy: (Math.random() - 0.5) * 60,
              life: 0.3, maxLife: 0.3,
              size: 3 + Math.random() * 2,
              color: '#fbbf24'
            });
          }
        }
      }
    }

    // Столкновение с птицами — отскок
    for (let i = birds.length - 1; i >= 0; i--) {
      const b = birds[i];
      const dx = FROG.x - b.x, dy = FROG.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < FROG.radius + b.radius) {
        // Отскок: vx разворачивается, vy подбрасывает вверх
        FROG.vx = -FROG.vx * 0.7;
        FROG.vy = -Math.abs(FROG.vy) - 200;
        playBirdHitSound();
        birds.splice(i, 1);
        // Частицы перьев
        for (let j = 0; j < 6; j++) {
          particleEffects.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 80,
            vy: (Math.random() - 0.5) * 80 - 30,
            life: 0.4, maxLife: 0.4,
            size: 2 + Math.random() * 3,
            color: Math.random() > 0.5 ? '#fff' : '#e0e0e0'
          });
        }
      }
    }

    FROG.vy += GRAVITY * dt;
    FROG.x += FROG.vx * dt;
    FROG.y += FROG.vy * dt;
    FROG.animTimer += dt * 6;

    // Наклон при падении — центр тяжести тянет вниз
    const targetRot = Math.max(-0.6, Math.min(0.6, FROG.vx * 0.002));
    FROG.rotation += (targetRot - (FROG.rotation || 0)) * 0.08;
  }

  if (FROG.state === 'idle') {
    FROG.animTimer += dt * 1.5;

    // Комбо: счётчик времени стояния
    platformStandTime += dt;

    // Таймер стояния для появления зрителей
    if (FROG.isOnPlatform) SPECTATORS.onStanding(dt);

    // Шипы — отсчёт до выскакивания
    if (FROG.isOnPlatform && FROG.currentPlatform && FROG.currentPlatform.type === 'spike') {
      const spike = FROG.currentPlatform;
      if (spike.spikeTimer !== undefined && spike.spikeTimer > 0) {
        spike.spikeTimer -= dt;
        if (spike.spikeTimer <= 0) {
          spike.spikeTimer = 0;
          spike.spikesOut = true;
          gameOverFunc();
          return;
        }
      }
    }

    // Лёд — отсчёт до исчезания
    if (FROG.isOnPlatform && FROG.currentPlatform && FROG.currentPlatform.type === 'ice') {
      const ice = FROG.currentPlatform;
      ice.iceTimer -= dt;
      if (ice.iceTimer <= 0) {
        // Платформа исчезает
        const idx = platforms.indexOf(ice);
        if (idx >= 0) platforms.splice(idx, 1);
        FROG.currentPlatform = null;
        FROG.state = 'jumping';
        FROG.vy = 30;
        FROG.isOnPlatform = false;
        FROG.rotation = -0.3;
        // Частицы льда
        for (let i = 0; i < 8; i++) {
          particleEffects.push({
            x: FROG.x, y: FROG.y + FROG.radius,
            vx: -40 + Math.random() * 80,
            vy: -60 - Math.random() * 40,
            life: 0.4 + Math.random() * 0.3,
            maxLife: 0.7,
            size: 3 + Math.random() * 4,
            color: '#7dd3fc'
          });
        }
      }
    }

    // Edge check — центр тяжести за краем (допуск 2px) → падаем
    if (FROG.isOnPlatform && FROG.currentPlatform) {
      const p = FROG.currentPlatform;
      if (!platforms.includes(p) || FROG.x <= p.x + 2 || FROG.x >= p.x + p.w - 2) {
        FROG.state = 'jumping';
        FROG.isOnPlatform = false;
        FROG.vy = 30;
        FROG.vx = FROG.x < p.x + p.w / 2 ? -40 : 40;
        FROG.currentPlatform = null;
        FROG.rotation = FROG.vx > 0 ? 0.3 : -0.3;
      }
    }
  }

  // Тонкая платформа — тонет пока лягушка на ней (idle или charging)
  if (FROG.isOnPlatform && FROG.currentPlatform && FROG.currentPlatform.type === 'thin' &&
      (FROG.state === 'idle' || FROG.state === 'charging')) {
    const thin = FROG.currentPlatform;
    thin.sinkTime = (thin.sinkTime || 0) + dt;
    const sinkSpeed = 22 + thin.sinkTime * 4;
    thin.y += sinkSpeed * dt;
    FROG.y = thin.y - FROG.radius;
    if (Math.random() < dt * 12) {
      particleEffects.push({
        x: thin.x + Math.random() * thin.w,
        y: thin.y + thin.h,
        vx: (Math.random() - 0.5) * 15,
        vy: 8 + Math.random() * 15,
        life: 0.25 + Math.random() * 0.2,
        maxLife: 0.45,
        size: 1.5 + Math.random() * 2,
        color: '#a3a3a3'
      });
    }
    if (thin.y > H + 50) {
      gameOverFunc();
      return;
    }
  }

  // ─── Коллизия с платформами ───
  if (FROG.state === 'jumping' || FROG.state === 'dead') {
    let landed = false;

    // ▸ Приземление сверху (swept: был над → пересёк поверхность)
    if (FROG.vy > 0) {
      for (const p of platforms) {
        if (prevY + FROG.radius < p.y &&
            FROG.y + FROG.radius >= p.y &&
            FROG.x + FROG.radius * 0.5 > p.x &&
            FROG.x - FROG.radius * 0.5 < p.x + p.w) {
          FROG.y = p.y - FROG.radius;
          FROG.vy = 0;
          FROG.vx = 0;
          FROG.state = 'idle';
          FROG.isOnPlatform = true;
          FROG.currentPlatform = p;
          FROG.rotation = 0;
          if (FROG.x < p.x + FROG.radius * 0.5) FROG.x = p.x + FROG.radius * 0.5 + 2;
          else if (FROG.x > p.x + p.w - FROG.radius * 0.5) FROG.x = p.x + p.w - FROG.radius * 0.5 - 2;
          landed = true;
          onLand(p);
          break;
        }
      }
    }

    // ▸ Боковой / нижний удар — circle vs AABB с выталкиванием и отскоком
    if (!landed) {
      for (const p of platforms) {
        if (FROG.x + FROG.radius <= p.x || FROG.x - FROG.radius >= p.x + p.w) continue;
        if (FROG.y + FROG.radius <= p.y || FROG.y - FROG.radius >= p.y + p.h) continue;

        // Глубина проникновения по каждой стороне
        const ol = (FROG.x + FROG.radius) - p.x;       // слева
        const or = (p.x + p.w) - (FROG.x - FROG.radius); // справа
        const ot = (FROG.y + FROG.radius) - p.y;        // сверху
        const ob = (p.y + p.h) - (FROG.y - FROG.radius); // снизу
        const min = Math.min(ol, or, ot, ob);

        if (min === ot && FROG.vy > 0) {
          // Удар сверху (не пойманный landing'ом) — всё равно приземляем
          FROG.y = p.y - FROG.radius;
          FROG.vy = 0; FROG.vx = 0;
          FROG.state = 'idle'; FROG.isOnPlatform = true;
          FROG.currentPlatform = p; FROG.rotation = 0;
          landed = true;
          onLand(p);
          break;
        } else if (min === ob && FROG.vy < 0) {
          // Удар снизу — отскакиваем вниз
          FROG.y = p.y + p.h + FROG.radius;
          FROG.vy = Math.abs(FROG.vy) * 0.35;
          FROG.vx *= 0.5;
          spawnBounceParticles(p, 'bottom');
        } else if (min === ol || min === or) {
          // Удар сбоку — отскакиваем по горизонтали
          FROG.x = (min === ol) ? p.x - FROG.radius : p.x + p.w + FROG.radius;
          FROG.vx = (min === ol ? -1 : 1) * Math.abs(FROG.vx) * 0.35;
          FROG.vy *= 0.5;
          spawnBounceParticles(p, min === ol ? 'left' : 'right');
        }
      }
    }

    // Смерть: упала за экран или отстала от камеры
    if (!landed && FROG.y > H + 50) gameOverFunc();
    if (!landed && FROG.x < camera.x - 100) gameOverFunc();
  }

  // Camera follows frog
  // ▸ Обновление подвижных платформ
  for (const p of platforms) {
    if (p.type !== 'moving') continue;
    if (p.moveAxis === 'y') {
      p.y += p.moveSpeed * p.moveDir * dt;
      if (p.y > p.moveY0 + 80) p.moveDir = -1;
      else if (p.y < p.moveY0 - 80) p.moveDir = 1;
      // Двигаем лягушку вместе с платформой
      if (FROG.isOnPlatform && FROG.currentPlatform === p) {
        FROG.y += p.moveSpeed * p.moveDir * dt;
      }
    } else {
      p.x += p.moveSpeed * p.moveDir * dt;
      if (p.x > p.moveX + 70) p.moveDir = -1;
      else if (p.x < p.moveX - 70) p.moveDir = 1;
      if (FROG.isOnPlatform && FROG.currentPlatform === p) {
        FROG.x += p.moveSpeed * p.moveDir * dt;
      }
    }
  }

  // Чистка собранных и далёких монеток
  coins = coins.filter(c => !c.collected && c.x > camera.x - 100);

  const targetCamX = Math.max(0, FROG.x - W * 0.35);
  camera.x += (targetCamX - camera.x) * 0.08;

  // Generate platforms ahead
  let lastP = platforms[platforms.length - 1];
  while (lastP.x + lastP.w < camera.x + W + 300) {
    lastP = generateNextPlatform(lastP);
  }

  // Remove platforms behind
  platforms = platforms.filter(p => p.x + p.w > camera.x - 200);

  // Update particles
  for (let i = particleEffects.length - 1; i >= 0; i--) {
    const pt = particleEffects[i];
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 200 * dt;
    pt.life -= dt;
    if (pt.life <= 0) particleEffects.splice(i, 1);
  }
}

// ─── Draw ───
function draw(time) {
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f172a');
  grad.addColorStop(0.4, '#1e3a5f');
  grad.addColorStop(0.7, '#2d6a4f');
  grad.addColorStop(1, '#1b4332');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Звёздное небо (натуральное, с мерцанием)
  drawStars(time);

  // Зрители (на заднем плане, экранные координаты)
  SPECTATORS.draw(ctx, time);

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Draw platforms
  for (const p of platforms) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(p.x + 3, p.y + 3, p.w, p.h);

    if (p.type === 'ice') {
      // ─── Ледяная платформа ───
      const iceGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      iceGrad.addColorStop(0, '#bae6fd');
      iceGrad.addColorStop(0.3, '#7dd3fc');
      iceGrad.addColorStop(1, '#38bdf8');
      ctx.fillStyle = iceGrad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();
      // Блики
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(p.x + 6, p.y + 2, p.w - 20, 3);
      ctx.fillRect(p.x + 4, p.y + 8, p.w - 12, 1);
      // Индикатор таймера (если активен)
      if (p.iceTimer > 0) {
        const frac = p.iceTimer / 1.2;
        ctx.fillStyle = `rgba(255,255,255,${0.2 + (1 - frac) * 0.4})`;
        ctx.fillRect(p.x, p.y, p.w * frac, 3);
      }
      // Снежинка
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '11px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('❄', p.x + p.w / 2, p.y + p.h - 4);
    } else if (p.type === 'house') {
      // ─── Домик-чекпоинт ───
      const houseGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      houseGrad.addColorStop(0, '#fcd34d');
      houseGrad.addColorStop(0.3, '#f59e0b');
      houseGrad.addColorStop(1, '#b45309');
      ctx.fillStyle = houseGrad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();
      // Дом на платформе
      const hx = p.x + p.w / 2, hy = p.y - 14;
      ctx.fillStyle = '#92400e';
      ctx.fillRect(hx - 8, hy + 4, 16, 10); // стены
      ctx.fillStyle = '#fcd34d';
      ctx.beginPath();
      ctx.moveTo(hx - 10, hy + 4);
      ctx.lineTo(hx, hy - 4);
      ctx.lineTo(hx + 10, hy + 4);
      ctx.closePath();
      ctx.fill(); // крыша
      ctx.fillStyle = '#fbbf24';
      ctx.fillRect(hx - 2, hy + 8, 4, 6); // дверь
      // Иконка сохранения
      if (p.scored) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '8px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('💾', hx, p.y + p.h - 2);
      }
    } else if (p.type === 'spike') {
      // ─── Шипованная платформа — красная, шипы только в момент смерти ───
      const activated = p.spikeTimer > 0 || p.spikesOut;
      const danger = activated ? (1 - p.spikeTimer / 1.5) : 0; // 0→1 за 1.5с
      // Красный градиент
      const spikeGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      spikeGrad.addColorStop(0, `rgb(${220 - danger * 40},${60 - danger * 30},${60 - danger * 30})`);
      spikeGrad.addColorStop(0.3, `rgb(${200 - danger * 30},${30 + danger * 20},${30 + danger * 20})`);
      spikeGrad.addColorStop(1, `rgb(${140 - danger * 20},${20 + danger * 40},${20 + danger * 40})`);
      ctx.fillStyle = spikeGrad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();
      // Пульсирующая полоска-таймер
      if (activated && !p.spikesOut) {
        const pulse = 0.3 + Math.sin(performance.now() / 1000 * 8) * 0.2;
        ctx.fillStyle = `rgba(255,80,80,${pulse})`;
        ctx.fillRect(p.x, p.y, p.w, 4);
      }
      // Шипы — только когда выскочили (смерть)
      if (p.spikesOut) {
        ctx.fillStyle = '#ef4444';
        const spikeW = 14;
        const count = Math.floor(p.w / spikeW);
        for (let i = 0; i < count; i++) {
          const sx = p.x + i * spikeW + (p.w - count * spikeW) / 2;
          ctx.beginPath();
          ctx.moveTo(sx, p.y);
          ctx.lineTo(sx + spikeW / 2, p.y - 10);
          ctx.lineTo(sx + spikeW, p.y);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '10px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('☠', p.x + p.w / 2, p.y + p.h - 3);
      } else if (!activated) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '9px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⚠', p.x + p.w / 2, p.y + p.h - 3);
      }
    } else if (p.type === 'moving') {
      // ─── Подвижная платформа ───
      const mg = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      mg.addColorStop(0, '#a78bfa');
      mg.addColorStop(0.3, '#7c3aed');
      mg.addColorStop(1, '#5b21b6');
      ctx.fillStyle = mg;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();
      // Стрелки
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '12px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.moveAxis === 'y' ? '↕' : '↔', p.x + p.w / 2, p.y + p.h - 3);
    } else if (p.type === 'spring') {
      // ─── Платформа-трамплин ───
      const sg = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      sg.addColorStop(0, '#fb923c');
      sg.addColorStop(0.3, '#f97316');
      sg.addColorStop(1, '#c2410c');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();
      // Пружинки
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const sx = p.x + 8 + i * (p.w - 16) / 2;
        ctx.beginPath();
        ctx.moveTo(sx, p.y - 4);
        ctx.lineTo(sx - 4, p.y - 10);
        ctx.lineTo(sx + 4, p.y - 16);
        ctx.lineTo(sx - 4, p.y - 22);
        ctx.lineTo(sx, p.y - 26);
        ctx.stroke();
      }
    } else if (p.type === 'thin') {
      // ─── Тонкая платформа — хрупкая, тонет под тяжестью ───
      const thinGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      thinGrad.addColorStop(0, '#a3e635');
      thinGrad.addColorStop(0.3, '#84cc16');
      thinGrad.addColorStop(1, '#4d7c0f');
      ctx.fillStyle = thinGrad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [3, 3, 1, 1]);
      ctx.fill();
      ctx.fillStyle = '#bef264';
      ctx.fillRect(p.x + 4, p.y + 1, p.w - 8, 2);
      // Трещины
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(p.x + p.w * 0.3, p.y);
      ctx.lineTo(p.x + p.w * 0.35, p.y + p.h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x + p.w * 0.7, p.y);
      ctx.lineTo(p.x + p.w * 0.65, p.y + p.h);
      ctx.stroke();
    } else {
      // ─── Обычная платформа ───
      const grassGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      grassGrad.addColorStop(0, '#4ade80');
      grassGrad.addColorStop(0.3, '#22c55e');
      grassGrad.addColorStop(1, '#166534');
      ctx.fillStyle = grassGrad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, [4, 4, 2, 2]);
      ctx.fill();

      // Grass top detail
      ctx.fillStyle = '#86efac';
      ctx.fillRect(p.x + 4, p.y + 2, p.w - 8, 4);

      // Texture lines
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const lx = p.x + 10 + i * 22;
        if (lx < p.x + p.w - 10) {
          ctx.beginPath();
          ctx.moveTo(lx, p.y + 7);
          ctx.lineTo(lx, p.y + p.h - 4);
          ctx.stroke();
        }
      }
    }
  }

  // ─── Монетки (вращающиеся) ───
  for (const c of coins) {
    if (c.collected) continue;
    const ct = performance.now() / 1000;
    c.spark += 3 * (1/60);
    const rot = Math.sin(c.spark); // -1..1 — сжатие для 3D-вращения
    const rx = c.r * Math.abs(rot) + 2;
    const ry = c.r;
    // Внешний золотой
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    // Внутренний тёмный
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, rx * 0.55, ry * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    // Блик
    if (rot > 0.3) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.ellipse(c.x - rx * 0.15, c.y - ry * 0.15, rx * 0.25, ry * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Ободок-мерцание
    ctx.strokeStyle = `rgba(255,220,100,${0.4 + Math.sin(c.spark * 2) * 0.3})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, rx + 1, ry + 1, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw frog
  const fx = FROG.x;
  const fy = FROG.y;

  // Frog shadow
  if (FROG.isOnPlatform) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(fx + 2, fy + FROG.radius + 3, FROG.radius * 0.8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(fx, fy);

  // Rotation during jump/fall
  if (FROG.state === 'jumping' || FROG.state === 'dead') {
    ctx.rotate(FROG.rotation || 0);
  }

  // Body
  const bodyGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, FROG.radius);
  bodyGrad.addColorStop(0, '#6ee7b7');
  bodyGrad.addColorStop(0.6, '#10b981');
  bodyGrad.addColorStop(1, '#047857');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, FROG.radius, FROG.radius * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#065f46';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, FROG.radius, FROG.radius * 0.85, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Eyes
  const eyeOffsetX = FROG.radius * 0.35;
  const eyeOffsetY = -FROG.radius * 0.3;
  const eyeR = FROG.radius * 0.3;

  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-eyeOffsetX, eyeOffsetY, eyeR, eyeR * 1.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(eyeOffsetX, eyeOffsetY, eyeR, eyeR * 1.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils - look in direction of movement
  const pupilOffX = FROG.vx > 5 ? 3 : (FROG.vx < -5 ? -3 : 0);
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(-eyeOffsetX + pupilOffX, eyeOffsetY + 1, eyeR * 0.55, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(eyeOffsetX + pupilOffX, eyeOffsetY + 1, eyeR * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // Pupil highlights
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(-eyeOffsetX + pupilOffX + 1.5, eyeOffsetY - 1, eyeR * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(eyeOffsetX + pupilOffX + 1.5, eyeOffsetY - 1, eyeR * 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Mouth (smile when idle, neutral when jumping)
  if (FROG.state === 'idle') {
    ctx.strokeStyle = '#065f46';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, FROG.radius * 0.15, FROG.radius * 0.3, 0.1, Math.PI - 0.1);
    ctx.stroke();
  } else {
    ctx.strokeStyle = '#065f46';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, FROG.radius * 0.05, FROG.radius * 0.2, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // Legs when standing
  if (FROG.isOnPlatform) {
    const legSwing = Math.sin(FROG.animTimer) * 2;
    ctx.strokeStyle = '#047857';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-FROG.radius * 0.5, FROG.radius * 0.5);
    ctx.lineTo(-FROG.radius * 0.7 + legSwing, FROG.radius * 0.85);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(FROG.radius * 0.5, FROG.radius * 0.5);
    ctx.lineTo(FROG.radius * 0.7 - legSwing, FROG.radius * 0.85);
    ctx.stroke();
  }

  ctx.restore();

  // ─── Птицы ───
  for (const b of birds) {
    ctx.save();
    ctx.translate(b.x, b.y);
    // Разворот по направлению полёта (летят влево)
    if (b.vx < 0) ctx.scale(-1, 1);
    const wingFlap = Math.sin(b.wingPhase) * 0.5;

    // Крыло дальнее
    ctx.fillStyle = '#a93226';
    ctx.beginPath();
    ctx.ellipse(2, -b.radius * 0.2 + wingFlap * 8, b.radius * 0.7, b.radius * 0.35, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // Тело
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius, b.radius * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Крыло ближнее
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.ellipse(-2, -b.radius * 0.2 - wingFlap * 8, b.radius * 0.7, b.radius * 0.35, 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Клюв
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.moveTo(b.radius * 0.7, -2);
    ctx.lineTo(b.radius * 1.4, 0);
    ctx.lineTo(b.radius * 0.7, 2);
    ctx.closePath();
    ctx.fill();

    // Глаз
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.radius * 0.3, -b.radius * 0.25, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(b.radius * 0.4, -b.radius * 0.25, 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Particle effects
  for (const pt of particleEffects) {
    const alpha = Math.max(0, pt.life / pt.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ─── HUD (camera-independent) ───

  // Charge bar (center-bottom)
  if (FROG.state === 'charging') {
    const barW = 200, barH = 14;
    const bx = (W - barW) / 2, by = H - 60;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(bx - 4, by - 4, barW + 8, barH + 8, 8);
    ctx.fill();

    // Fill
    const fillW = barW * FROG.charge;
    const chargeGrad = ctx.createLinearGradient(bx, 0, bx + barW, 0);
    chargeGrad.addColorStop(0, '#4ade80');
    chargeGrad.addColorStop(0.6, '#facc15');
    chargeGrad.addColorStop(1, '#ef4444');
    ctx.fillStyle = chargeGrad;
    ctx.beginPath();
    ctx.roundRect(bx, by, fillW, barH, 4);
    ctx.fill();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`⚡ ${Math.round(FROG.charge * 100)}%`, bx + barW / 2, by - 8);
  }

  // ─── Комбо-множитель ───
  if (comboCount >= 2 && (FROG.state === 'jumping' || FROG.state === 'idle' || FROG.state === 'charging')) {
    const comboAlpha = FROG.state === 'idle' ? 0.6 : 0.9;
    ctx.save();
    ctx.globalAlpha = comboAlpha;
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`×${comboCount}`, W / 2, H - 120);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ─── Частицы ветра ───
  for (const p of windParticles) {
    const alpha = Math.max(0, p.life / p.maxLife) * 0.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#e0f2fe';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Game Over ───
function gameOverFunc() {
  if (!gameRunning) return;
  gameRunning = false;
  gameOver = true;
  FROG.state = 'dead';
  playDeathSound();
  finalScoreEl.textContent = score;
  finalCoinsEl.textContent = coinScore;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('frogBest', bestScore.toString());
    bestScoreEl.textContent = bestScore;
  }
  goMain.style.display = 'block';
  goConfirm.style.display = 'none';
  gameoverEl.classList.add('visible');
  // Показываем кнопку рекламы (один раз за смерть)
  adBtn.style.display = 'inline-block';
  adBtn.disabled = false;
  adBtn.textContent = '💎 Смотреть рекламу и продолжить';
}

// ─── Restart ───
function restart() {
  init();
}

// ─── Отрисовка мёртвой лягушки в оверлее ───
function drawDeadFrog() {
  const ctx = deadFrogCtx;
  const cw = 80, ch = 80;
  ctx.clearRect(0, 0, cw, ch);
  // Явный прозрачный фон — никакого чёрного квадрата
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, cw, ch);

  const t = performance.now() / 1000;
  const cx = cw / 2;
  const cy = ch * 0.55 + Math.sin(t * 2.5) * 3;
  const r = 26;

  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r + 2, r * 0.85, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  const g = ctx.createRadialGradient(cx - 4, cy - 6, 3, cx, cy, r);
  g.addColorStop(0, '#6ee7b7');
  g.addColorStop(0.6, '#10b981');
  g.addColorStop(1, '#047857');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#065f46';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r * 0.85, 0, 0, Math.PI * 2);
  ctx.stroke();

  const blink = Math.sin(t * 13) > 0.85 && Math.floor(t / 2.8) % 2 === 0;
  const ex = r * 0.35, ey = r * 0.3, er = r * 0.3;

  if (blink) {
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - ex - er, cy - ey); ctx.lineTo(cx - ex + er, cy - ey); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + ex - er, cy - ey); ctx.lineTo(cx + ex + er, cy - ey); ctx.stroke();
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx - ex, cy - ey, er, er * 1.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + ex, cy - ey, er, er * 1.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(cx - ex, cy - ey + 2, er * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + ex, cy - ey + 2, er * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(cx - ex + 2, cy - ey - 1, er * 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + ex + 2, cy - ey - 1, er * 0.2, 0, Math.PI * 2); ctx.fill();
  }

  ctx.strokeStyle = '#065f46';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.3, r * 0.25, Math.PI + 0.1, -0.1);
  ctx.stroke();

  const ls = Math.sin(t * 3) * 2;
  ctx.strokeStyle = '#047857';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy + r * 0.45); ctx.lineTo(cx - r * 0.65 + ls, cy + r * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + r * 0.5, cy + r * 0.45); ctx.lineTo(cx + r * 0.65 - ls, cy + r * 0.78); ctx.stroke();
}

// ─── Game Loop ───
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);
  draw(time);
  if (gameOver) drawDeadFrog();

  requestAnimationFrame(gameLoop);
}

// ─── roundRect polyfill for Canvas ───
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = Array.isArray(radii) ? radii : [radii, radii, radii, radii];
    const [tl, tr, br, bl] = r.map(v => Math.min(v || 0, Math.min(w, h) / 2));
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// ─── Start ───
VK.init();
init();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
